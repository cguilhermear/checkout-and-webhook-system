<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Interno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Raleway', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-900 via-indigo-900 to-purple-800 text-white">
    <div class="relative w-full max-w-md flex items-center justify-center">
        <div class="tarot-entrance w-80 h-[420px] bg-gradient-to-br from-purple-950 via-indigo-950 to-purple-900 rounded-3xl shadow-2xl border-4 border-purple-500/60 flex flex-col items-center justify-center p-0 overflow-hidden">
            <div class="w-full flex flex-col items-center pt-6 pb-2">
                <svg class="w-16 h-16 text-purple-400 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M13.5 2.5L15 7l4.5 1.5L15 10l-1.5 4.5L12 10 7.5 8.5 12 7z"/>
                </svg>
                <div class="mt-2 text-lg font-cinzel font-bold text-purple-300 tracking-wide">Acesso Restrito</div>
            </div>
            <form id="loginForm" class="flex-1 w-full flex flex-col justify-center px-8 gap-6">
                <div>
                    <label for="usuario" class="block text-sm font-bold mb-2 text-purple-200">Usuário</label>
                    <input type="text" id="usuario" name="usuario" required class="w-full bg-purple-900/60 border-2 border-purple-500 rounded-lg px-4 py-2 text-sm focus:border-purple-400 focus:outline-none text-white placeholder-purple-400">
                </div>
                <div>
                    <label for="senha" class="block text-sm font-bold mb-2 text-purple-200">Senha</label>
                    <input type="password" id="senha" name="senha" required class="w-full bg-purple-900/60 border-2 border-purple-500 rounded-lg px-4 py-2 text-sm focus:border-purple-400 focus:outline-none text-white placeholder-purple-400">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition">Entrar</button>
            </form>
            <div id="loginError" class="text-red-400 mt-2 text-center text-sm hidden">Usuário ou senha inválidos.</div>
        </div>
    </div>
    <style>
        .tarot-entrance {
            animation: tarotCardIn 1.2s cubic-bezier(.68,-0.55,.27,1.55) forwards;
            transform: translateY(-120vh) scale(0.7) rotate(-8deg);
        }
        @keyframes tarotCardIn {
            0% { transform: translateY(-120vh) scale(0.7) rotate(-8deg); opacity: 0; }
            60% { transform: translateY(20px) scale(1.05) rotate(2deg); opacity: 1; }
            80% { transform: translateY(-8px) scale(1) rotate(-2deg); }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
    <script>
        // Mock login: usuário = admin, senha = 1234
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            if (usuario === 'admin' && senha === '1234') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
